<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Tanisha | Mera Dil</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4d6d;
            --glass: rgba(0, 0, 0, 0.8);
            --border: rgba(255, 77, 109, 0.5);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif; background: #000; overflow: hidden;
            color: white;
        }

        /* Cinematic Background */
        #bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            transition: background-image 1.2s ease-in-out;
            z-index: -1; transform: scale(1.05);
        }

        #game-wrapper {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 40px 20px; box-sizing: border-box;
        }

        #stats-bar {
            background: var(--glass); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 50px; border: 1px solid var(--border);
            color: var(--pink); font-weight: 600; font-size: 1.1rem;
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.2);
        }

        /* Moving Character System */
        .character-container {
            display: flex; gap: 80px; align-items: flex-end;
            margin-bottom: -10px;
        }

        .avatar {
            width: 260px; height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 77, 109, 0.3));
            animation: breathe 3s ease-in-out infinite;
            transition: all 0.5s ease;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Dialogue UI */
        #dialogue-container {
            width: 100%; max-width: 850px;
            background: var(--glass); backdrop-filter: blur(20px);
            border: 2px solid var(--border); border-radius: 30px;
            padding: 35px; box-sizing: border-box;
            box-shadow: 0 -10px 60px rgba(0,0,0,0.9);
            margin-bottom: 20px;
        }

        #name-tag {
            color: var(--pink); font-family: 'Dancing Script', cursive;
            font-size: 2.2rem; margin-bottom: 15px; display: block;
        }

        #text-content {
            font-size: 1.15rem; line-height: 1.8; min-height: 80px;
            margin-bottom: 25px; color: #f0f0f0;
        }

        /* 4-Option Grid */
        #options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
            color: white; padding: 15px; border-radius: 15px;
            cursor: pointer; opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem; text-align: center;
        }

        .option-btn.show { opacity: 1; transform: translateY(0); }

        .option-btn:hover {
            background: var(--pink); border-color: white;
            box-shadow: 0 0 30px var(--pink); transform: scale(1.05);
        }

        /* The "No" Button Logic */
        #no-btn { position: absolute; transition: 0.2s linear; z-index: 9999; }

        /* End Screen */
        #end-screen {
            display: none; position: fixed; inset: 0; background: #000;
            z-index: 2000; justify-content: center; align-items: center;
            text-align: center; flex-direction: column;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="end-screen">
        <h1 style="color: var(--pink); font-family: 'Dancing Script'; font-size: 5rem; margin-bottom: 10px;">I love you my perfect girl.</h1>
        <p style="color: white; font-size: 2rem; font-weight: 300;">Now come here and tell me that you love me more. ❤️</p>
    </div>

    <div id="game-wrapper">
        <div id="stats-bar">💖 SCORE: <span id="score">0</span></div>

        <div class="character-container">
            <img id="char-left" class="avatar" src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=Starfish&backgroundColor=b6e3f4" alt="You">
            <img id="char-right" class="avatar" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Tanisha&backgroundColor=ffdfbf" alt="Tanisha">
        </div>

        <div id="dialogue-container">
            <span id="name-tag">Starfishy</span>
            <div id="text-content"></div>
            <div id="options-grid"></div>
        </div>
    </div>

<script>
    let score = 0;
    const gameData = [
        { text: "Tanisha... Meri Jaan... are you really mad at your favorite dumb idiot? I've been a total starfish lately.", bg: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=1200", 
          options: ["Open the message", "Call him a dumb idiot", "Sigh and listen", "Ignore (for 2 seconds)"] },
        
        { text: "I know I ignored you and I'm a complete starfish for that. You're Mera Dil, you deserve 100% of me.", bg: "https://images.unsplash.com/photo-1516339901600-2e1a62dc0c45?w=1200", 
          options: ["Damn right I do", "Say 'I'm a starfish'", "You're lucky you're mine", "Still listening..."] },

        { text: "How is my Lil Penguin doing? Did you know you're the most beautiful girl in the world even when you're mad?", bg: "https://images.unsplash.com/photo-1507502707541-f369a3b18502?w=1200", 
          options: ["I know I am", "Stop flirting, idiot", "Keep going...", "Maybe a little bit"] },

        { text: "I miss you calling me baby. My life is boring without my Lil Baby Girl bossing me around.", bg: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1200", 
          options: ["I'm the boss forever", "I miss you too", "Shut up, starfish", "Give me attention then"] },

        { text: "Remember our first memory? I realized then that you were Meri Zindigi. My everything.", bg: "https://images.unsplash.com/photo-1494947665470-20322015e3a8?w=1200", 
          options: ["That was sweet", "You're a dork", "I remember", "My Sab Kuch"] },

        { text: "I'm a dumb idiot, but I'm YOUR dumb idiot. Can we make a deal to never be mad for long?", bg: "https://images.unsplash.com/photo-1535905590362-38751f1515df?w=1200", 
          options: ["Deal", "Maybe if you're good", "10 minute limit", "I'll think about it"] },

        { text: "If I could, I'd fly us to Paris right now just to see you smile. Would you let me hold your hand?", bg: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1200", 
          options: ["Yes, please", "Maybe in Paris", "Hold it now", "Only if you're quiet"] },

        { text: "Next stop: Italy! We'd eat pizza and I'd stare at you the whole time like a crazy person.", bg: "https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=1200", 
          options: ["That's creepy lol", "I love pizza", "Stare at me more", "Take me there!"] },

        { text: "Then Tokyo! We'd see the neon lights, but you'd be the brightest thing there, Meri Jaan.", bg: "https://images.unsplash.com/photo-1503899036084-c55cdd92da26?w=1200", 
          options: ["Smooth...", "I love Tokyo", "Buy me everything", "You're so cheesy"] },

        { text: "We'd travel the whole world together. Every country, every city, as long as I'm with my Lil Penguin.", bg: "https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=1200", 
          options: ["Everywhere?", "Promise?", "Just us two", "Pack your bags"] },

        { text: "Halfway mark! You've been so patient with this starfish. Do you like this surprise so far?", bg: "https://images.unsplash.com/photo-1518895949257-7621c3c786d7?w=1200", 
          options: ["I love it", "It's okay", "You're trying", "Best surprise ever"] },

        { text: "I stare at your pictures and literally forget how to breathe. I'm such a dumb idiot for you.", bg: "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=1200", 
          options: ["Don't die lol", "Aww baby", "I do that too", "Keep breathing!"] },

        { text: "You're my perfect girl. Everything about you—your smile, your laugh, your sass—is my favorite.", bg: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=1200", 
          options: ["Even the sass?", "Tell me more", "I'm the best", "Love you too"] },

        { text: "What's one thing you want to do with your Starfishy as soon as you see him?", bg: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1200", 
          options: ["Giant hug", "Big kiss", "Smack you", "Eat food"] },

        { text: "I promise to always be your protector. No one messes with my Lil Baby Girl. Ever.", bg: "https://images.unsplash.com/photo-1505481710153-605175282460?w=1200", 
          options: ["My hero", "So brave", "I'm tough too", "Protect me always"] },

        { text: "You are my Sab Kuch. My world starts and ends with you, Tanisha.", bg: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=1200", 
          options: ["Meri Zindigi", "My Starfish", "Forever?", "I'm blushing"] },

        { text: "I'll never ignore you again. I'll be the best boyfriend ever. No more starfish moments, I promise!", bg: "https://images.unsplash.com/photo-1516589174184-c685eb3df123?w=1200", 
          options: ["Better be", "I'll hold you to it", "Pinky promise?", "We'll see"] },

        { text: "I'm counting down the seconds until I can hold you. You're my heart, my soul, my everything.", bg: "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=1200", 
          options: ["Me too", "Hurry up", "Wait for me", "I love you"] },

        { text: "We're almost at the end... are you ready for the big question?", bg: "https://images.unsplash.com/photo-1430931071372-38127bd472b8?w=1200", 
          options: ["Yes!", "Wait!", "I'm nervous", "Ready"] },

        { text: "Do you forgive me, mera dil?", bg: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1200", 
          isFinal: true,
          options: ["Yes", "No", "Definitely Yes", "Yes, Baby Girl"] }
    ];

    const textEl = document.getElementById('text-content');
    const optionsEl = document.getElementById('options-grid');
    const bgEl = document.getElementById('bg-layer');
    const scoreEl = document.getElementById('score');

    function typeWriter(text, i, cb) {
        if (i < text.length) {
            textEl.innerHTML += text.charAt(i);
            setTimeout(() => typeWriter(text, i + 1, cb), 45);
        } else if (cb) { cb(); }
    }

    function loadAct(idx) {
        if (idx >= gameData.length) return;
        const act = gameData[idx];
        textEl.innerHTML = "";
        optionsEl.innerHTML = "";
        bgEl.style.backgroundImage = `url('${act.bg}')`;

        typeWriter(act.text, 0, () => {
            act.options.forEach((optText, i) => {
                setTimeout(() => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn show';
                    btn.innerHTML = optText;
                    
                    if (act.isFinal && optText === "No") {
                        btn.id = 'no-btn';
                        btn.onmouseover = () => {
                            btn.style.left = Math.random() * 70 + '%';
                            btn.style.top = Math.random() * 70 + '%';
                        };
                    } else {
                        btn.onclick = () => {
                            score += 50;
                            scoreEl.innerText = score;
                            if (act.isFinal) {
                                document.getElementById('end-screen').style.display = 'flex';
                            } else {
                                loadAct(idx + 1);
                            }
                        };
                    }
                    optionsEl.appendChild(btn);
                }, i * 350);
            });
        });
    }

    loadAct(0);
</script>
</body>
</html>
