<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Tanisha | Mera Dil</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ffccd5;
            --yellow: #fff8e1;
            --glass: rgba(255, 255, 255, 0.96);
            --border: #ffccd5;
            --text: #444;
            --accent: #ff758f;
        }

        /* Prevent scrolling/bouncing on iOS */
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif; background: var(--yellow);
            overflow: hidden; color: var(--text); touch-action: manipulation;
        }

        #bg-layer {
            position: fixed; inset: 0;
            background-size: cover; background-position: center;
            transition: background-image 1.2s ease-in-out;
            z-index: -1; filter: brightness(0.7) saturate(1.2);
        }

        #game-wrapper {
            height: 100dvh; /* Dynamic viewport for mobile */
            display: flex; flex-direction: column;
            justify-content: space-between; align-items: center;
            padding: 15px; box-sizing: border-box;
            position: relative; z-index: 1;
        }

        /* Animated Sunflower Rain */
        .flower {
            position: absolute; font-size: 25px;
            top: -50px; user-select: none;
            animation: flowerFall 7s linear infinite;
            z-index: 0; pointer-events: none;
        }

        @keyframes flowerFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0.3; }
        }

        #stats-bar {
            background: white; padding: 8px 20px; border-radius: 50px;
            border: 2px solid var(--border); color: var(--accent);
            font-weight: 600; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(255, 117, 143, 0.2);
        }

        /* Alive Avatars with Multi-Animations */
        .character-container {
            display: flex; gap: 30px; align-items: center; justify-content: center;
            width: 100%; margin: 10px 0;
        }

        .char-box { text-align: center; transition: all 0.3s ease; }

        .icon-avatar {
            font-size: 4.5rem; display: block;
            filter: drop-shadow(0 0 10px rgba(255, 117, 143, 0.3));
        }

        /* Bounce for Starfish */
        .starfish-anim { animation: starfishBounce 3s ease-in-out infinite; }
        @keyframes starfishBounce {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* Float for Penguin */
        .penguin-anim { animation: penguinFloat 4s ease-in-out infinite; }
        @keyframes penguinFloat {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.1) rotate(3deg); }
        }

        .id-label {
            font-size: 0.7rem; font-weight: 600; color: var(--accent);
            background: white; padding: 2px 8px; border-radius: 10px;
            margin-top: 5px; display: inline-block; border: 1px solid var(--border);
        }

        /* Mobile Optimized Dialogue Box */
        #dialogue-container {
            width: 100%; max-width: 500px; background: var(--glass);
            border: 3px solid var(--border); border-radius: 25px;
            padding: 20px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        #name-tag {
            color: var(--accent); font-family: 'Dancing Script', cursive;
            font-size: 1.8rem; margin-bottom: 5px; display: block;
        }

        #text-content { 
            font-size: 1rem; line-height: 1.4; min-height: 70px; 
            margin-bottom: 15px; font-weight: 400;
        }

        /* 2x2 Grid for touch targets */
        #options-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 10px; position: relative;
        }

        .option-btn {
            background: #fff; border: 2px solid var(--border);
            color: var(--accent); padding: 12px 5px; border-radius: 15px;
            cursor: pointer; opacity: 0; transition: transform 0.2s, opacity 0.3s;
            font-size: 0.8rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            min-height: 50px;
        }

        .option-btn.show { opacity: 1; }
        .option-btn:active { transform: scale(0.95); background: var(--pink); }

        /* runaway button for mobile */
        #no-btn { 
            position: fixed; 
            z-index: 1000;
            width: 80px;
        }

        #end-screen {
            display: none; position: fixed; inset: 0; background: var(--yellow);
            z-index: 10000; justify-content: center; align-items: center;
            text-align: center; flex-direction: column; padding: 20px;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>

    <div id="end-screen">
        <h1 style="color: var(--accent); font-family: 'Dancing Script'; font-size: 3.5rem;">I love you my perfect girl.</h1>
        <p style="font-size: 1.5rem;">Now come here and tell me that you love me more. ❤️🌻</p>
    </div>

    <div id="game-wrapper">
        <div id="stats-bar">💖 HEARTS: <span id="score">0</span></div>

        <div class="character-container">
            <div class="char-box">
                <span class="icon-avatar starfish-anim">⭐</span>
                <span class="id-label">STARFISHY</span>
            </div>
            <div class="char-box">
                <span class="icon-avatar penguin-anim">🐧</span>
                <span class="id-label">PENGUIN</span>
            </div>
        </div>

        <div id="dialogue-container">
            <span id="name-tag">Starfishy</span>
            <div id="text-content"></div>
            <div id="options-grid"></div>
        </div>
    </div>

<script>
    let score = 0;
    const gameData = [
        { text: "Tanisha... Meri Jaan... are you really mad at your favorite dumb idiot? I've been a total starfish lately.", bg: "https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800", options: ["Open the message with sass", "Call him a dumb idiot", "Sigh and listen", "Bully him"] },
        { text: "I know I messed up and I'm a complete dumbass idiot for that. ap Mera Dil hai, you deserve 100% of me.", bg: "https://images.unsplash.com/photo-1516339901600-2e1a62dc0c45?w=800", options: ["Damn right", "say I'm a starfish", "your Lucky you're mine", "your Still an idiot"] },
        { text: "How is my Lil Penguin doing? Did you know you're the most beautiful girl in the world even when you're mad?", bg: "https://images.unsplash.com/photo-1507502707541-f369a3b18502?w=800", options: ["I know I am", "Stop flirting dum dum", "Keep going...", "Maybe a little"] },
        { text: "I miss you calling me baby. My life is boring without my Lil Baby Girl bossing me around.", bg: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=800", options: ["I'm the boss", "i Miss you more", "Shut up starfish", "Pay attention next time"] },
        { text: "Remember our first memory? I realised then that you were My everything. My Sab Kuch.", bg: "https://images.unsplash.com/photo-1494947665470-20322015e3a8?w=800", options: ["cutie", "your a Dumb idiot", "I remember", "My Sab Kuch.."] },
        { text: "I'm a dumb idiot, but I'm YOUR dumb idiot. Can we make a deal to never be mad for long?", bg: "https://images.unsplash.com/photo-1535905590362-38751f1515df?w=800", options: ["Deal", "Maybe", "10 min limit", "i will Think about it"] },
        { text: "If I could, I'd fly us to Paris right now just to see you smile. Would you let me hold your hand?", bg: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=800", options: ["Yes please", "Only In Paris", "Hold it rn", "Quiet it starfish im still mad"] },
        { text: "Next stop: Italy! We'd eat pizza and I'd stare at you the whole time like a crazy person.", bg: "https://images.unsplash.com/photo-1523906834658-6e24ef2386f9?w=800", options: ["Creepy lol", "no pasta", "Stare more cutie", "Take me rn!"] },
        { text: "Then Tokyo! We'd see the neon lights, but you'd be the brightest thing there, Meri Jaan.", bg: "https://images.unsplash.com/photo-1503899036084-c55cdd92da26?w=800", options: ["Smooth...", "i Love Tokyo", "Buy me everything from there", "Cheesy boy"] },
        { text: "We'd travel the whole world together. Every country, every city, as long as I'm with my Lil Penguin.", bg: "https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800", options: ["Everywhere?", "Promise?", "Just us two", "hmmm is this a bribe?"] },
        { text: "Halfway mark! You've been so patient with this starfish. Do you like this surprise so far?", bg: "https://images.unsplash.com/photo-1518895949257-7621c3c786d7?w=800", options: ["i Love it", "its okay", "You're trying", "Best ever"] },
        { text: "I stare at your pictures and literally forget how to breathe. I'm such a dumb idiot for you.", bg: "https://images.unsplash.com/photo-1490730141103-6cac27aaab94?w=800", options: ["Don't die", "Aww baby", "I do that too", "Breathe!"] },
        { text: "You're my perfect girl. Everything about you—your smile, your laugh, your sass—is my favorite.", bg: "https://images.unsplash.com/photo-1529333166437-7750a6dd5a70?w=800", options: ["Even sass?", "Tell me more", "I'm the best", "i Love you more"] },
        { text: "What's one thing you want to do with your Starfishy as soon as you see him?", bg: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800", options: ["Giant hug", "Big kiss", "Smack you", "Eat food and not even share"] },
        { text: "I promise to always be your protector. No one messes with my Lil Baby Girl. Ever.", bg: "https://images.unsplash.com/photo-1505481710153-605175282460?w=800", options: ["My big baby", "whose gonna protect you from me", "im a Tough girl", "Protect me"] },
        { text: "You are my Sab Kuch. My world starts and ends with you, Tanisha.", bg: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=800", options: ["Meri Zindigi", "prove it", "Forever?", "Blushing"] },
        { text: "I'll never ignore you again. I'll be the best hubby ever. No more starfish moments.", bg: "https://images.unsplash.com/photo-1516589174184-c685eb3df123?w=800", options: ["Better be", "you better hold to it", "Pinky promise", "We'll see"] },
        { text: "I'm counting down the seconds until I can hold you. You're my heart, my soul, my everything.", bg: "https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800", options: ["Me too", "Hurry up", "Wait for me", "I love you"] },
        { text: "We're almost at the end... are you ready for the big question?", bg: "https://images.unsplash.com/photo-1430931071372-38127bd472b8?w=800", options: ["Yes!", "Wait!", "Nervous", "Ready"] },
        { text: "Do you forgive me, mera dil?", bg: "https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=800", isFinal: true, options: ["Yes", "No", "Definitely", "Yes, Baby Girl"] }
    ];

    const textEl = document.getElementById('text-content');
    const optionsEl = document.getElementById('options-grid');
    const bgEl = document.getElementById('bg-layer');

    function createFlower() {
        const f = document.createElement('div');
        f.className = 'flower';
        f.innerHTML = '🌻';
        f.style.left = Math.random() * 100 + 'vw';
        f.style.animationDuration = (Math.random() * 3 + 4) + 's';
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 7000);
    }
    setInterval(createFlower, 300);

    function typeWriter(text, i, cb) {
        if (i < text.length) {
            textEl.innerHTML += text.charAt(i);
            setTimeout(() => typeWriter(text, i + 1, cb), 35);
        } else if (cb) cb();
    }

    function moveNo(btn) {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
    }

    function loadAct(idx) {
        const act = gameData[idx];
        textEl.innerHTML = ""; optionsEl.innerHTML = "";
        bgEl.style.backgroundImage = `url('${act.bg}')`;

        typeWriter(act.text, 0, () => {
            act.options.forEach((opt) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn show';
                btn.innerHTML = opt;
                
                if (act.isFinal && opt === "No") {
                    btn.id = 'no-btn';
                    // For Mobile: Runs away when TAPPED
                    btn.onclick = (e) => { e.stopPropagation(); moveNo(btn); };
                    // For Desktop: Runs away when hovered
                    btn.onmouseover = () => moveNo(btn);
                } else {
                    btn.onclick = () => {
                        score += 50;
                        document.getElementById('score').innerText = score;
                        if (act.isFinal) document.getElementById('end-screen').style.display = 'flex';
                        else loadAct(idx + 1);
                    };
                }
                optionsEl.appendChild(btn);
            });
        });
    }

    loadAct(0);
</script>
</body>
</html>
